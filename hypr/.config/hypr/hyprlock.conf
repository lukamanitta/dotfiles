# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Roboto Mono, "Symbols Nerd Font Mono", monospace

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path =
    reload_cmd = echo "$(waypaper --list | jq -r '.[0].wallpaper')"
    reload_time = 0
    color = rgb(0c0c0c)
    blur_passes = 2
}

input-field {
    monitor = DP-2
    size = 20%, 5%
    outline_thickness = 1
    inner_color = rgba(0c0c0cff)

    outer_color = rgba(0c0c0cff)
    check_color = rgba(6179c2ff)
    fail_color = rgba(cc5d4bff)

    font_color = rgba(ccccccff)
    fade_on_empty = false
    rounding = 2

    font_family = $font
    placeholder_text = ...
    fail_text = $PAMFAIL

    # uncomment if you wish to display a message during authentication
    # check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 0
    halign = center
    valign = center
}

shape {
    monitor = DP-2
    size = 10%, 3%
    color = rgba(0c0c0cff)
    rounding = 2
    position = 0, 43
    halign = center
    valign = center
}

# DATE-TIME
label {
    monitor = DP-2
    text = cmd[update:5000] date +"%a %Y-%m-%d %H:%M" # update every 60 seconds
    font_size = 10
    font_family = $font
    color = rgba(ccccccff)

    position = 0, 43
    halign = center
    valign = center
    z-index = 1
}

