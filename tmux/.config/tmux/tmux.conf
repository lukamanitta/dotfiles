# Source config file
bind r source-file ~/.config/tmux/tmux.conf

# Don't exit tmux when closing a session
set-option -g detach-on-destroy off

# Change prefix to Ctrl-A
set-option -g prefix C-a
unbind C-b
bind a send-prefix

# vi is good
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Kill pane keybind
bind-key x kill-pane

# Split panes using | and -
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the current pane's directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Alt + hjkl
bind -n M-h resize-pane -L
bind -n M-j resize-pane -D
bind -n M-k resize-pane -U
bind -n M-l resize-pane -R

# Move panes using Ctrl + Alt + hjkl
# bind -n C-M-h swap-pane -L
# bind -n C-M-j swap-pane -D
# bind -n C-M-k swap-pane -U
# bind -n C-M-l swap-pane -R

# Equalize pane sizes
bind \\ select-layout even-horizontal
bind = select-layout even-vertical
bind + select-layout tiled

# Maximise / restore pane
bind f resize-pane -Z
bind Enter resize-pane -Z

# Mouse settings
set -g mouse on

# Disable automatic window renaming
# set-option -g allow-rename off

# Enable automatic window renaming
set-option -g allow-rename on
# set-option -g automatic-rename on
# set-option -g automatic-rename-format "[#{b:pane_current_path}] #{pane_current_command}"
# set-option -g automatic-rename-format "[#(git-location --relative-to #{pane_current_path} --with-root --with-folder --with-icons || echo ' #{pane_current_path}')] #{pane_current_command}"
# set-option -g automatic-rename-format "[#(git-aware-formatted-cwd --relative-to #{pane_current_path} --icons --bold)] #{pane_current_command}"
set -g focus-events on
set-hook -g pane-focus-in "run-shell 'tmux rename-window \"$(~/.config/tmux/tmux-window-rename-cmd --relative-to #{pane_current_path} --command-pid #{pane_pid})\"'"

# Start window and pane numbers from 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Switch between sessions
bind -r ( switch-client -p
bind -r ) switch-client -n

# Switch between windows
bind -r [ previous-window
bind -r ] next-window

# Colour
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-window-option -g window-status-current-style fg=white

# Status bar config
## Set status bar background to black and foreground to white
set -g status-position bottom
set -g status-interval 5
set -g status-left " "
set -g status-left-length 50
set -g status-right "#[fg=brightblack,italics] #{session_name} "
set -g window-status-format "#[fg=brightblack,italics]#I: #W"
set -g window-status-current-format "#[fg=default,bold]#I: #W"
set-window-option -g window-status-separator "#[fg=brightblack] | "
set -g status-style bg=default

# Pane border config
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=default

# Message config
set -g message-style fg=white,bg=black
set -g message-command-style fg=white,bg=black
set -g prompt-cursor-colour white

# Other settings
set -sg escape-time 0
set -g history-limit 20000
