background =   "#190a01"
foreground =   "#e8cab3"

cursor_bg =    "#e8cab3"
cursor_fg =    "#190a01"

selection_bg = "#a6511e"
selection_fg = "#e8cab3"

accent =       "#cf6525"

vim_background = "dark"
vim_name = "Mini Base16"

wallpaper = "~/.wallpaper/cosy/howls-moving-castle-calcifer.png"

base00 = "#190a01" # Default Background
base01 = "#401c03" # Lighter Background (Used for status bars)
base02 = "#a6511e" # Selection Background
base03 = "#66574d" # Comments, Invisibles, Line Highlighting
base04 = "#756c67" # Dark Foreground (Used for status bars)
base05 = "#e8cab3" # Default Foreground, Caret, Delimiters, Operators
base06 = "#e6d3c5" # Light Foreground (Not often used)
base07 = "#e6d3c5" # Lightest Foreground (Not often used)
base08 = "#cf6525" # Variables, XML Tags, Markup Link Text, Markup Lists, Diff Deleted
base09 = "#f1a335" # Integers, Boolean, Constants, XML Attributes, Markup Link Url
base0A = "#c44f20" # Classes, Markup Bold, Search Text Background
base0B = "#816c41" # Strings, Inherited Class, Markup Code, Diff Inserted
base0C = "#9a7d67" # Support, Regular Expressions, Escape Characters, Markup Quotes
base0D = "#f0642d" # Functions, Methods, Attribute IDs, Headings
base0E = "#eb8057" # Keywords, Storage, Selector, Markup Italic, Diff Changed
base0F = "#b03726" # Deprecated, Opening/Closing Embedded Language Tags, e.g. <?php ?>

[regular]
black =   "#190a01"
red =     "#b03726"
green =   "#c44f20"
yellow =  "#f1a335"
blue =    "#e0630f"
magenta = "#f0642d"
cyan =    "#815c41"
white =   "#e8cab3"

[bright]
black =   "#756c67"
red =     "#e9523f"
green =   "#cf6525"
yellow =  "#f4b55d"
blue =    "#ff7a21"
magenta = "#eb8057"
cyan =    "#9a7d67"
white =   "#e6d3c5"
