[ghostty]
template = "~/.config/colourme/templates/ghostty"
destination = "~/.config/ghostty/themes/Luka"
post_hook = "pkill -USR2 ghostty"

[hypr]
template = "~/.config/colourme/templates/hypr.conf"
destination = "~/.config/hypr/theme/colourme.conf"
post_hook = "hyprctl reload"

[nvim]
template = "~/.config/colourme/templates/nvim.lua"
destination = "~/.config/nvim/lua/ui/set_colourscheme.lua"

[nvim-base16]
template = "~/.config/colourme/templates/nvim-base16.lua"
destination = "~/.config/nvim/lua/ui/palettes/colourme.lua"

[zen_browser]
template = "~/.config/colourme/templates/zen_browser.css"
destination = "~/.zen/vsyh95ca.Default (release)/chrome/userChrome.css"

[waybar]
template = "~/.config/colourme/templates/waybar.css"
destination = "~/.config/waybar/colors.css"

[quickshell]
template = "~/.config/colourme/templates/quickshell.qml"
destination = "~/.config/quickshell/_Shared/Singletons/Colours.qml"

[waypaper]
template = "~/.config/colourme/templates/waypaper.ini"
destination = "~/.config/waypaper/wallpaper.ini"
post_hook = "waypaper --restore --state-file ~/.config/waypaper/wallpaper.ini"

[wofi]
template = "~/.config/colourme/templates/wofi.css"
destination = "~/.config/wofi/colors.css"

[spicetify-matte]
template = "~/.config/colourme/templates/spicetify-matte.ini"
destination = "~/.config/spicetify/Themes/Matte/color.ini"
post_hook = "spicetify apply"

[openrgb]
template = "~/.config/colourme/templates/openrgb.txt"
destination = "~/.config/OpenRGB/colourme.txt"
post_hook = "openrgb -c $(cat ~/.config/OpenRGB/colourme.txt)"


